# ==============================================
# Paramètres des horaires d'ouverture
# ==============================================

# Note : si le système d'horaires ne fonctionne pas, c'est sûrement à cause d'une mauvaise configuration des heures min et max.
workingHours:
  enabled: false # Activer les horaires d'ouverture
  timezone: "Europe/Paris" # Fuseau horaire
  bypassRoles: [] # Rôles pouvant contourner la restriction de création de tickets
  default: # Horaires par défaut pour tout jour non spécifié ci-dessous
    min: "09:00"
    max: "17:00"
    blockTicketCreation: true
  days:
    - day: "monday" # Options : "monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"
      min: "09:00" # Heure minimum (format HH:MM, ex: 00:59, 05:00)
      max: "17:00" # Heure maximum (format HH:MM, ex: 00:59, 17:00)
      blockTicketCreation: true # Bloquer la création de tickets en dehors des horaires
    - day: "tuesday"
      min: "09:00"
      max: "17:00"
      blockTicketCreation: true
    - day: "wednesday"
      min: "09:00"
      max: "17:00"
      blockTicketCreation: true
    - day: "thursday"
      min: "09:00"
      max: "17:00"
      blockTicketCreation: true
    - day: "friday"
      min: "09:00"
      max: "17:00"
      blockTicketCreation: true
    - day: "saturday"
      min: "09:00"
      max: "12:00"
      blockTicketCreation: true
    - day: "sunday"
      min: "09:00"
      max: "12:00"
      blockTicketCreation: true
  outsideWarning: true # Afficher un avertissement si un ticket est créé hors des heures d'ouverture
  addField: true # Ajouter le champ "Horaires d'ouverture" à l'embed de création de ticket
  fieldTitle: "Horaires d'ouverture" # Titre du champ
  valueDays: "TODAY" # "TODAY" (afficher les horaires du jour) ou "ALL" (afficher tous les jours)
  fieldValue: "> {day} : de {openingTime} à {closingTime}" # Valeur affichée

