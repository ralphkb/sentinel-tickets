# ==============================================
# Paramètres généraux du bot de tickets
# ==============================================

dbPath: "{root}/data" # Chemin de base pour le dossier de données, utilisez {root} pour le répertoire de travail actuel du bot.
rolesThatCanBlacklist: ["111111111111111111"] # Les identifiants (ID) des rôles du personnel de votre serveur autorisés à blacklister et déblacklister des utilisateurs pour la création de tickets, par ex. ["000000000000000000", "111111111111111111"].
rolesOnBlacklist: [] # Les ID des rôles que le bot attribuera aux utilisateurs blacklistés. Laissez vide pour désactiver cette fonctionnalité.
blacklistCleanup: "120" # Le délai en secondes entre chaque vérification de nettoyage de la blacklist, pour retirer automatiquement les utilisateurs/rôles dont la sanction a expiré.
transcriptType: "HTML" # Le format de la transcription, peut être "HTML" ou "TXT".
transcriptName: "{channelName}-transcript" # Le nom du fichier de transcription généré. Utilisez {channelName} pour le nom du salon du ticket, {username} pour le pseudo du créateur du ticket et {displayName} pour son nom d'affichage. L'extension du fichier s'adaptera au type de transcription : .html pour HTML et .txt pour TXT.
transcriptImages: false # Activer ou désactiver la sauvegarde des images dans les transcriptions HTML. Notez que cela augmentera la taille du fichier et le temps de génération.
reOpenStaffOnly: false # Si activé, seuls les membres du personnel avec un rôle de support peuvent rouvrir un ticket.
closeStaffOnly: true # Si activé, seuls les membres du personnel avec un rôle de support peuvent utiliser le bouton pour fermer un ticket.
deleteStaffOnly: true # Si activé, seuls les membres du personnel avec un rôle de support peuvent utiliser le bouton de suppression. Il est recommandé de le laisser activé, sauf si vous comptez utiliser l'option de rôles autorisés (allowedRoles) lors de la configuration des boutons plus bas.
commands_cooldown: "5" # Le temps de recharge (cooldown) des commandes, en secondes.
buttons_cooldown: "5" # Le temps de recharge des boutons, en secondes.
maxOpenTickets: "1" # Le nombre maximum de tickets qu'un utilisateur peut avoir ouverts simultanément.
preventNewTicket: false # Vérifie si l'utilisateur possède déjà un ticket fermé avant d'en créer un nouveau. Ne l'activez que si cela correspond vraiment à vos besoins. L'activer sans permettre à l'utilisateur de rouvrir ou de voir son ticket fermé causera des problèmes. Cette fonctionnalité se désactivera automatiquement si maxOpenTickets n'est pas défini sur 1.
silentStartup: false # Si activé, le bot évitera de polluer la console au démarrage avec des messages inutiles.
deleteTicketTime: "5" # Le délai en secondes avant la suppression définitive d'un ticket.
claimFeature: false # Activer ou désactiver le bouton/la fonctionnalité de prise en charge (claim).
claimRename: false # Si activé, renomme le ticket en catégorie-UTILISATEUR lors de sa prise en charge, en utilisant le pseudo du membre du staff qui s'en occupe.
claimRenameName: "{category}-{username}" # Le nouveau nom du ticket une fois pris en charge. Options : {category} pour la catégorie, {username} pour le pseudo du staff, {displayname} pour le nom d'affichage/surnom du staff.
claim1on1: false # Si activé, lors de la prise en charge d'un ticket, seuls le créateur du ticket et le membre du staff l'ayant réclamé pourront y discuter.
status:
  botActivityText: "Tickets de support" # Le message d'activité du bot
  botActivityType: "Watching" # Le type d'activité du bot ("Playing" = Joue à, "Streaming" = Diffuse, "Listening" = Écoute, "Watching" = Regarde, "Competing" = Participe à).
  streamingOptionURL: "" # L'URL si vous utilisez l'option de streaming.
  botStatus: "online" # Le statut du bot ("online" = en ligne, "idle" = inactif, "dnd" = ne pas déranger, "invisible"). Notez que le statut "Streaming" requiert le statut "online".
alertReply:
  enabled: false # Activer ou désactiver l'attente de la réponse du créateur du ticket pendant le délai spécifié ci-dessous, une fois l'alerte envoyée.
  time: "300" # Le délai par défaut en secondes. Évitez les valeurs trop extrêmes.
  autoAction: "none" # L'action automatique du bot si l'utilisateur ne répond pas dans le temps imparti. Peut être "close" (fermer) ou "delete" (supprimer). Mettez "none" pour désactiver l'automatisation.
autoCloseTickets:
  enabled: false # Activer ou désactiver la fermeture automatique des tickets
  interval: "60" # L'intervalle en secondes de la tâche de fermeture automatique
  time: "86400" # Le délai en secondes depuis le dernier message du ticket avant sa fermeture. Par ex., si défini sur 1 jour (en secondes), le ticket sera fermé si le dernier message date de plus de 24h. Le temps par défaut est de 1 jour.
  ignoreBots: false # Ignorer les messages des bots lors de la vérification du dernier message d'un ticket
autoDeleteTickets:
  enabled: false # Activer ou désactiver la suppression automatique des tickets fermés
  interval: "60" # L'intervalle en secondes de la tâche de suppression automatique
  time: "86400" # Le délai en secondes depuis l'heure de fermeture du ticket avant sa suppression. Par ex., si défini sur 1 jour, le ticket sera supprimé s'il a été fermé il y a 24h sans avoir été rouvert. Le temps par défaut est de 1 jour.
onUserLeave: "close" # L'action automatique du bot si un utilisateur quitte le serveur avec un ticket ouvert ("close", "delete" ou "none").
addUsersBack: true # Si activé, le bot rajoutera l'utilisateur à ses tickets (ouverts ou fermés) s'il revient sur le serveur. Attention : cela redonnera les permissions "Voir le salon" et "Voir les anciens messages" s'il est réajouté à un ticket fermé.
statsChannels:
  enabled: false # Activer ou désactiver les salons de statistiques
  interval: "600" # L'intervalle en secondes pour la mise à jour (minimum 600s/10min pour éviter les limites de l'API Discord).
  channels:
    - channelID: "111111111111111111" # L'ID du salon vocal qui sera renommé avec les statistiques
      type: "totalTickets" # Le type de stat : totalTickets, openTickets, totalClaims, totalReviews, ratings, totalMessages, ticketCreators, avgTicketCreators, memberCount
      name: "Total des Tickets : {stats}" # Le nom du salon. Utilisez {stats} pour afficher la valeur.
    - channelID: "111111111111111111"
      type: "openTickets"
      name: "Tickets Ouverts : {stats}"
    - channelID: "111111111111111111"
      type: "ratings"
      name: "Note Moyenne : {stats}/5.0"

# ==============================================
# Paramètres des catégories de tickets
# ==============================================

# La limite de Discord est de 25, bien qu'il soit conseillé de ne pas utiliser autant de types puisque chaque type utilise 2 catégories et la limite globale Discord est de 50 catégories.
# Permissions possibles : ViewChannel, SendMessages, EmbedLinks, AttachFiles, ReadMessageHistory, ManageChannels...
# NOTE : Le bot peut nécessiter la permission Administrateur selon la configuration. Si vous obtenez l'erreur "Missing Permissions", votre bot manque de droits.
TicketCategories:
  - id: 1 # ID unique pour chaque catégorie, UTILISEZ UNIQUEMENT DES NOMBRES
    name: "signalement" # Nom de la catégorie (sera mis en minuscules)
    nameEmoji: "⌛️" # Émoji du nom. Laissez "" pour ne pas en mettre.
    categoryID: ["111111111111111111"] # Les ID des catégories où les tickets seront créés
    closedCategoryID: ["111111111111111111"] # Les ID des catégories où iront les tickets fermés
    support_role_ids: ["000000000000000000", "111111111111111111"] # Les rôles du staff pouvant accéder à cette catégorie
    permissions: # N'ajoutez jamais la même permission dans 'allow' et 'deny'
      ticketCreator:
        open:
          allow: [
              "ViewChannel",
              "SendMessages",
              "EmbedLinks",
              "AttachFiles",
              "ReadMessageHistory",
            ] # Permissions accordées au créateur dans un ticket ouvert
          deny: [] # Permissions refusées au créateur dans un ticket ouvert
        close:
          allow: [] # Permissions accordées au créateur dans un ticket fermé
          deny: ["SendMessages"] # Permissions refusées au créateur dans un ticket fermé
      supportRoles:
        open:
          allow:
            [
              "ViewChannel",
              "SendMessages",
              "EmbedLinks",
              "AttachFiles",
              "ReadMessageHistory",
            ]
          deny: []
        close:
          allow: []
          deny: ["SendMessages"]
      addedRoles:
        open:
          allow:
            [
              "ViewChannel",
              "SendMessages",
              "EmbedLinks",
              "AttachFiles",
              "ReadMessageHistory",
            ]
          deny: []
        close:
          allow: []
          deny: ["SendMessages"]
      addedUsers:
        open:
          allow:
            [
              "ViewChannel",
              "SendMessages",
              "EmbedLinks",
              "AttachFiles",
              "ReadMessageHistory",
            ]
          deny: []
        close:
          allow: []
          deny: ["SendMessages"]
    pingRoles: false # Activer ou désactiver la mention des rôles lors de l'ouverture
    ping_role_ids: [] # Les ID des rôles à mentionner, ex. ["000000000000000000"]
    ghostPingRoles: false # Activer le "ghost ping" (mention fantôme). Utilisez soit cette option, soit {support-roles} dans textContent. N'utilisez pas les deux.
    textContent: "" # Le texte accompagnant l'embed. Utilisez {support-roles}, {user} et {user.tag}
    creatorRoles: [] # Rôles pouvant créer des tickets ici. Laissez vide pour autoriser tout le monde.
    buttonEmoji: "👮" # L'émoji du bouton
    buttonLabel: "Signaler un membre" # Le nom du bouton
    buttonStyle: "Success" # Options: "Primary" (bleu), "Secondary" (gris), "Success" (vert), "Danger" (rouge)
    menuEmoji: "👮" # L'émoji de l'option du menu déroulant
    menuLabel: "Signaler un membre" # Nom de l'option
    menuDescription: "Cliquez ici pour signaler un utilisateur !"
    embedTitle: "Ticket de Signalement" # Le titre de l'embed
    color: "#FFD700" # La couleur de l'embed
    description: "Bienvenue {user} ({user.tag}) dans votre ticket de signalement ! Veuillez patienter pendant qu'un membre du personnel traite votre demande."
    ticketName: "category-ticketcount" # Format du nom du salon. Options : category-username, category-ticketcount, etc.
    ticketTopic: "Créateur : {user} | Type de ticket : {type}" # Le sujet (topic) du salon
    slowmode: "0" # Mode lent du ticket en secondes (0 pour désactiver)
    useCodeBlocks: false # Utiliser des blocs de code pour afficher les réponses aux questions de la catégorie
    modal: true # Afficher un formulaire (modal) avant l'ouverture du ticket
    modalTitle: "Formulaire de Signalement" # Le titre du formulaire
    questions: # Maximum 5 questions, gardez-en au moins 1.
      - label: "Quel est votre pseudo ?"
        placeholder: "Saisissez votre pseudo"
        style: "Short" # Short (Court) ou Paragraph (Paragraphe)
        required: true # Question obligatoire (true) ou non (false)
        minLength: 3 # Nombre de caractères minimum
      - label: "Pseudo du membre signalé ?"
        placeholder: "Saisissez son pseudo"
        style: "Short"
        required: true
        minLength: 3
      - label: "Pourquoi le signalez-vous ?"
        placeholder: "Expliquez en détail"
        style: "Paragraph"
        required: true
        minLength: 50
        maxLength: 1000 # Nombre de caractères maximum
  - id: 2 # ID unique pour chaque catégorie
    name: "autre"
    nameEmoji: ""
    categoryID: ["111111111111111111"]
    closedCategoryID: ["111111111111111111"]
    support_role_ids: ["000000000000000000"]
    permissions:
      ticketCreator:
        open:
          allow:
            [
              "ViewChannel",
              "SendMessages",
              "EmbedLinks",
              "AttachFiles",
              "ReadMessageHistory",
            ]
          deny: []
        close:
          allow: []
          deny: ["SendMessages"]
      supportRoles:
        open:
          allow:
            [
              "ViewChannel",
              "SendMessages",
              "EmbedLinks",
              "AttachFiles",
              "ReadMessageHistory",
            ]
          deny: []
        close:
          allow: []
          deny: ["SendMessages"]
      addedRoles:
        open:
          allow:
            [
              "ViewChannel",
              "SendMessages",
              "EmbedLinks",
              "AttachFiles",
              "ReadMessageHistory",
            ]
          deny: []
        close:
          allow: []
          deny: ["SendMessages"]
      addedUsers:
        open:
          allow:
            [
              "ViewChannel",
              "SendMessages",
              "EmbedLinks",
              "AttachFiles",
              "ReadMessageHistory",
            ]
          deny: []
        close:
          allow: []
          deny: ["SendMessages"]
    pingRoles: true
    ping_role_ids: ["000000000000000000"]
    ghostPingRoles: false
    textContent: "Merci de patienter pendant que le {support-roles} vérifie votre ticket !"
    creatorRoles: []
    buttonEmoji: "🤔"
    buttonLabel: "Autre demande"
    buttonStyle: "Primary"
    menuEmoji: "🤔"
    menuLabel: "Autre demande"
    menuDescription: "Cliquez ici pour ouvrir un ticket divers !"
    embedTitle: "Ticket Autre"
    color: "#ADD8E6"
    description: "Bienvenue {user} ({user.tag}) dans votre ticket ! Veuillez patienter pendant qu'un membre du personnel vous répond."
    ticketName: "category-username"
    ticketTopic: "Créateur : {user} | Type de ticket : {type}"
    slowmode: "0"
    useCodeBlocks: false
    modal: true
    modalTitle: "Formulaire de Ticket"
    questions:
      - label: "Quelle est votre question ?"
        placeholder: "Saisissez votre question"
        style: "Paragraph"
        required: true
        minLength: 10
        maxLength: 1000

