# ==============================================
# Paramètres de messages privés (MP)
# ==============================================
# Activer ou désactiver l'envoi d'un MP à l'utilisateur une fois son ticket supprimé.
# Si les 3 options sont sur false, aucun MP ne sera envoyé.
DMUserSettings:
  embed: true # Envoyer un embed dans le MP
  transcript: true # Envoyer la transcription dans le MP
  ratingSystem:
    enabled: false # Activer le système de notation (même si les 2 options ci-dessus sont désactivées)
    menu:
      emoji: "⭐"
      placeholder: "Sélectionnez une note"
    modal: true # Afficher un formulaire d'avis dans le MP
    modalTitle: "Avis sur le ticket"
    questions: # Maximum 5 questions, gardez-en au moins 1
      - label: "Quel est votre retour d'expérience ?"
        placeholder: "Rédigez votre avis ici."
        style: "Paragraph"
        required: true
        minLength: 80
        maxLength: 1000

