# ==============================================
# Paramètres des Réponses Automatiques
# ==============================================

# Vous pouvez ajouter autant de déclencheurs (triggers) que vous le souhaitez, ils seront testés dans l'ordre
# Pour chaque déclencheur, le bot vérifiera si le message remplit la condition
# Si le message correspond, le bot enverra une réponse

# La condition peut être l'une des suivantes :
# - startswith: Le message commence par le texte spécifié (insensible à la casse)
# - exact: Le message correspond exactement au texte spécifié (insensible à la casse)
# - endswith: Le message se termine par le texte spécifié (insensible à la casse)
# - contains: Le message contient le texte spécifié (insensible à la casse)
# - strict: Le message correspond exactement au texte spécifié (sensible à la casse)

# Le paramètre séparateur (separator) est utilisé pour mettre en forme le texte détecté dans la réponse.
# Il permet de mettre en surbrillance le mot ou l'expression détecté(e).
# Options recommandées :
# - "`" pour le code en ligne
# - "**" pour le texte en gras
# - "*" pour le texte en italique

# L'option ignoreMembers est un tableau d'ID d'utilisateurs à ignorer.
# Le bot n'enverra aucune réponse automatique à ces utilisateurs.

# L'option ignoreRoles est un tableau d'ID de rôles à ignorer.
# Le bot n'enverra pas de réponse aux utilisateurs possédant l'un de ces rôles. Laissez vide pour désactiver.

# L'option requiredRoles est un tableau d'ID de rôles requis pour déclencher la réponse.
# Si l'utilisateur ne possède pas au moins l'un des rôles listés, le bot ne répondra pas. Laissez vide pour désactiver.

autoResponses:
  enabled: false # False par défaut, mettez sur true pour activer les réponses automatiques
  triggers:
    - condition: contains
      contains:
        - "aide"
        - "support"
        - "assistance"
      response: "Voici de l'aide concernant votre demande."
      separator: "`"
      ignoreMembers: []
      ignoreRoles: []
      requiredRoles: []
    - condition: startswith
      startsWith:
        - "bonjour"
        - "salut"
      response: "Bonjour ! Comment puis-je vous aider ?"
      separator: "*"
      ignoreMembers: []
      ignoreRoles: []
      requiredRoles: []
    - condition: endswith
      endsWith:
        - "merci"
        - "merci beaucoup"
      response: "Je vous en prie !"
      separator: "**"
      ignoreMembers: []
      ignoreRoles: []
      requiredRoles: []
    - condition: exact
      exact:
        - "quel est ton but ?"
        - "que peux tu faire ?"
      response: "Je peux vous assister dans diverses tâches et répondre à vos questions."
      separator: "`"
      ignoreMembers: []
      ignoreRoles: []
      requiredRoles: []
    - condition: strict
      strict:
        - "Ping"
        - "Pong"
      response: "Pong"
      separator: "`"
      ignoreMembers: []
      ignoreRoles: []
      requiredRoles: []

autoResponsesEmbed:
  color: "#2FF200"
  title: "Réponses Automatisées"
  description: "Q : {question}\nR : {answer}\n\n"
  timestamp: true
